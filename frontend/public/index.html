<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- Viewport Configuration -->
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover" />

    <!-- Theme & App Configuration -->
    <meta name="theme-color" content="#6366F1" />
    <meta name="color-scheme" content="light" />

    <!-- Apple iOS Web App -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Alarm" />
    <link rel="apple-touch-icon" href="/icons/ios/180.png" />

    <!-- Chrome Android Web App -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- SEO & Description -->
    <meta name="description" content="Shared Alarm and Task Reminder System with Firebase Notifications. Stay organized with instant alarm notifications and task management." />
    <meta name="application-name" content="Alarm Reminder" />

    <!-- Manifest & Icons -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/android/launchericon-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/android/launchericon-512x512.png" />

    <!-- Font Preload -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- PWA Preload Hints -->
    <link rel="preconnect" href="https://www.gstatic.com" />
    <link rel="dns-prefetch" href="https://www.gstatic.com" />

    <title>Alarm Reminder - Task Management</title>
    <style>
      html, body, #root {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #F8FAFC;
        color: #0F172A;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Prevent zoom on iOS */
      input[type="text"],
      input[type="email"],
      input[type="password"],
      input[type="number"],
      textarea,
      select {
        font-size: 16px;
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #CBD5E1;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94A3B8;
      }

      /* Selection color */
      ::selection {
        background: rgba(99, 102, 241, 0.2);
        color: #0F172A;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <noscript>This app requires JavaScript to run.</noscript>
  </body>
</html>
